# Netlify — Configuración de despliegue para Chocolates Helena Frontend

[build]
  # Carpeta base donde está el frontend
  base    = "frontend"
  # No hay proceso de build (es HTML/CSS/JS puro)
  publish = "."

# Reglas de redirección — SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache largo para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
